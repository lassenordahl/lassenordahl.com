<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>draw — lasse's display</title>
  </head>
  <body>
    <div class="draw-page">
      <div class="draw-header">
        <div class="draw-title-row">
          <h2 class="draw-title">draw a picture please</h2>
        </div>
        <div class="draw-divider"></div>
      </div>

      <p class="draw-subtitle">thanks</p>

      <div class="pixel-grid" id="pixel-grid"></div>

      <div class="draw-controls">
        <div class="palette" id="palette"></div>
        <button class="action-btn" id="save-btn">save</button>
        <button class="action-btn" id="clear-btn">clear</button>
      </div>

      <section class="saves-panel" aria-labelledby="saves-label">
        <div class="saves-label" id="saves-label">— previous drawings —</div>
        <div class="saves-list" id="saves-list"></div>
        <p class="saves-empty" id="saves-empty">no saves yet</p>
      </section>
    </div>
  </body>
</html>
